name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Least-privilege GITHUB_TOKEN: the test/lint/e2e jobs only read the repo.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          node --check src/shared/blueprint.js
          node --check src/shared/config.js
          node --check src/shared/paths.js
          node --check src/shared/storage.js
          node --check src/shared/protocol.js
          node --check src/runtime/bootstrap.js
          node --check src/runtime/bootstrap-paths.js
          node --check src/runtime/blueprint-steps.js
          node --check src/runtime/install-script.js
          node --check src/runtime/php-prepend.js
          node --check src/runtime/crash-recovery.js
          node --check src/runtime/fs-persistence.js
          node --check src/runtime/manifest.js
          node --check src/runtime/networking.js
          node --check src/runtime/php-compat.js
          node --check src/runtime/php-loader.js
          node --check src/runtime/vfs.js
          node --check src/remote/main.js
          node --check src/shell/main.js
          node --check lib/nextcloud-loader.js
          node --check php-worker.js
          node --check sw.js

      - name: Run unit tests
        run: make test

      - name: Lint
        run: make lint

      - name: Sync browser dependencies (vendor/)
        run: npm run sync-browser-deps

      - name: Build worker bundle
        run: npm run build-worker

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build --strict

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Install dependencies
        run: npm install

      - name: Build Nextcloud default bundle (NC 33)
        run: make bundle

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: "true"
